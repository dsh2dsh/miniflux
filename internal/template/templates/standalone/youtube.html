<div class="youtube">
    <div>
        <iframe
          src="{{ .IframeSrc }}"
          width="{{ or .Width 640 }}"
          height="{{ or .Height 390 }}"
          frameborder="0"
          allowfullscreen
          loading="lazy"
          sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
          referrerpolicy="strict-origin-when-cross-origin"
          credentialless>
        </iframe>
    </div>

    {{ .Description }}
</div>
